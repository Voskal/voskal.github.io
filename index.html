<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- Makes the website display correctly on phones -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Our Photos</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="container">
        <header class="intro">
            <h1>Our Memories</h1>

            <p>
                A small collection of photographs from a very special day.
            </p>
        </header>

        <section class="gallery">
            <figure class="photo-card">
                <img
                    src="images/photo1.jpg"
                    alt="Description of the first photograph"
                >
                <figcaption>First photograph</figcaption>
            </figure>

            <figure class="photo-card">
                <img
                    src="images/photo2.jpg"
                    alt="Description of the second photograph"
                >
                <figcaption>Second photograph</figcaption>
            </figure>

            <figure class="photo-card">
                <img
                    src="images/photo3.jpg"
                    alt="Description of the third photograph"
                >
                <figcaption>Third photograph</figcaption>
            </figure>
        </section>

        <footer>
            <p>Made with care.</p>
        </footer>
    </main>
</body>
</html>
